<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make 10</title>
    <link rel="stylesheet" href="numbergame.css">
</head>
<body>
    <h1>Make 10</h1>
    
    <div class="game-info">
        <div class="timer">⌛️ <span id="time">100</span></div>
        <div class="selection-info"><span id="sum">0</span></div>
        <div class="score">📊 <span id="score">0</span></div>
    </div>
    
    <!-- 게임 모드 선택 다이얼로그 -->
    <dialog id="mode-selection-dialog" class="mode-dialog">
        <div class="dialog-content">
            <h2>게임 모드 선택</h2>
            <div class="mode-buttons">
                <button id="mode-stage-btn" class="mode-btn">
                    <span class="mode-icon">🗺️</span>
                    <span class="mode-text">스테이지 모드</span>
                </button>
                <button id="mode-frenzy-btn" class="mode-btn frenzy">
                    <span class="mode-icon">🔥</span>
                    <span class="mode-text">프렌지 모드</span>
                </button>
            </div>
        </div>
    </dialog>
    
    <!-- 스테이지 타일 템플릿 -->
    <template id="stage-template">
        <div class="stage-item" data-stage="">
            <div class="stage-number"></div>
            <div class="stars"></div>
        </div>
    </template>
    
    <!-- 스테이지 선택 다이얼로그 -->
    <dialog id="stage-selection-dialog" class="stage-dialog">
        <div class="dialog-content">
            <h2>스테이지 선택</h2>
            <div class="page-info">
                <span id="page-display">페이지 1/10</span>
            </div>
            <div class="stages-container">
                <!-- 스테이지 타일들은 JavaScript로 동적 생성 -->
            </div>
            <div class="pagination">
                <button id="prev-page" class="page-btn">&lt;</button>
                <div class="page-numbers">
                    <!-- 페이지 번호는 JavaScript로 동적 생성 -->
                </div>
            <div class="dialog-buttons">
                <button id="close-stage-selection" class="dialog-close-btn">닫기</button>
            </div>
        </div>
    </dialog>

    <!-- 일시 정지 메뉴 다이얼로그 -->
    <dialog id="pause-menu-dialog" class="pause-dialog">
        <div class="dialog-content">
            <h2>일시 정지</h2>
            <div class="pause-menu-buttons">
                <button id="continue-btn" class="pause-menu-btn">계속하기</button>
                <button id="restart-from-pause-btn" class="pause-menu-btn">다시 시작하기</button>
                <button id="give-up-btn" class="pause-menu-btn">포기하기</button>
            </div>
        </div>
    </dialog>

    <!-- 확인 다이얼로그 (다시 시작하기/포기하기 확인용) -->
    <dialog id="confirmation-dialog" class="confirmation-dialog">
        <div class="dialog-content">
            <h2 id="confirmation-title">확인</h2>
            <p id="confirmation-message">정말로 이 작업을 진행하시겠습니까?</p>
            <div class="confirmation-buttons">
                <button id="confirm-yes-btn" class="confirmation-btn">예</button>
                <button id="confirm-no-btn" class="confirmation-btn">아니오</button>
            </div>
        </div>
    </dialog>

    <div id="game-grid" class="game-grid"></div>
    
    <!-- 일시 정지 버튼 (오른쪽 하단에 고정) -->
    <button id="pause-btn" class="pause-btn">⏸️</button>
    
    <div class="game-over" id="game-over">
        <div class="game-over-content">
            <h2 id="result-message">게임 종료!</h2>
            <p id="game-end-reason" class="game-end-reason"></p>
            <p>최종 점수:</p>
            <div class="score-display" id="final-score">0</div>
            <div class="stage-clear-info" id="stage-clear-info" style="display: none;">
                <p class="stage-clear-message">스테이지 클리어!</p>
                <div class="stage-stars" id="stage-stars">★★★</div>
            </div>
            <div class="game-buttons">
                <button class="restart-btn" id="restart-btn">재시작</button>
                <button class="next-stage-btn" id="next-stage-btn" style="display: none;">다음 스테이지</button>
                <button class="stage-select-btn" id="stage-select-btn">스테이지 선택</button>
            </div>
        </div>
    </div>
    
    <div id="stage-number">Stage <span class="stage-number">1</span></div>
    <script type="module" src="js/game/main.js">
    </script>

</body>

</html>
