<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make 10</title>
    <link rel="stylesheet" href="numbergame.min.css">
</head>
<body>
    <h1>Make 10</h1>
    
    <div class="game-info">
        <div class="timer">вҢӣпёҸ <span id="time">100</span></div>
        <div class="selection-info"><span id="sum">0</span></div>
        <div class="score">рҹ“Ҡ <span id="score">0</span></div>
    </div>
    
    <!-- мҠӨн…Ңмқҙм§Җ нғҖмқј н…ңн”ҢлҰҝ -->
    <template id="stage-template">
        <div class="stage-item" data-stage="">
            <div class="stage-number"></div>
            <div class="stars"></div>
        </div>
    </template>
    
    <!-- мҠӨн…Ңмқҙм§Җ м„ нғқ лӢӨмқҙм–јлЎңк·ё -->
    <dialog id="stage-selection-dialog" class="stage-dialog">
        <div class="dialog-content">
            <h2>мҠӨн…Ңмқҙм§Җ м„ нғқ</h2>
            <div class="page-info">
                <span id="page-display">нҺҳмқҙм§Җ 1/10</span>
            </div>
            <div class="stages-container">
                <!-- мҠӨн…Ңмқҙм§Җ нғҖмқјл“ӨмқҖ JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
            </div>
            <div class="pagination">
                <button id="prev-page" class="page-btn">&lt;</button>
                <div class="page-numbers">
                    <!-- нҺҳмқҙм§Җ лІҲнҳёлҠ” JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                </div>
                <button id="next-page" class="page-btn">&gt;</button>
            </div>
            <div class="dialog-buttons">
                <button id="close-stage-selection" class="dialog-close-btn">лӢ«кё°</button>
            </div>
        </div>
    </dialog>

    <div id="game-grid" class="game-grid"></div>
    
    <div class="game-over" id="game-over">
        <div class="game-over-content">
            <h2 id="result-message">кІҢмһ„ мў…лЈҢ!</h2>
            <p id="game-end-reason" class="game-end-reason"></p>
            <p>мөңмў… м җмҲҳ:</p>
            <div class="score-display" id="final-score">0</div>
            <div class="stage-clear-info" id="stage-clear-info" style="display: none;">
                <p class="stage-clear-message">мҠӨн…Ңмқҙм§Җ нҒҙлҰ¬м–ҙ!</p>
                <div class="stage-stars" id="stage-stars">вҳ…вҳ…вҳ…</div>
            </div>
            <div class="game-buttons">
                <button class="restart-btn" id="restart-btn">мһ¬мӢңмһ‘</button>
                <button class="next-stage-btn" id="next-stage-btn" style="display: none;">лӢӨмқҢ мҠӨн…Ңмқҙм§Җ</button>
                <button class="stage-select-btn" id="stage-select-btn">мҠӨн…Ңмқҙм§Җ м„ нғқ</button>
            </div>
        </div>
    </div>
    
    <div id="stage-number">Stage <span class="stage-number">1</span></div>
    <script type="module" src="numbergame.min.js">
    </script>
</body>

</html>
